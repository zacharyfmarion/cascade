name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  # Crates requiring system libraries (glib, OpenColorIO, webkit2gtk) not available on CI
  WORKSPACE_EXCLUDES: --exclude cascade-ocio-sys --exclude cascade-ocio --exclude cascade-tauri

jobs:
  changes:
    name: CI Change Detection
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.code_filter.outputs.rust }}
      frontend: ${{ steps.code_filter.outputs.frontend }}
      e2e: ${{ steps.code_filter.outputs.e2e }}
      docs_only: ${{ steps.docs_only.outputs.value }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: code_filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            rust:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.cargo/**'
              - 'crates/**'
              - 'apps/tauri/**'
            frontend:
              - 'package.json'
              - 'yarn.lock'
              - 'apps/web/**'
              - 'apps/tauri/**'
              - 'crates/cascade-wasm/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
            e2e:
              - 'apps/web/e2e/**'
              - 'apps/web/src/**'
              - 'apps/web/package.json'
              - 'apps/web/playwright.config.ts'
              - 'crates/cascade-wasm/**'
              - 'crates/cascade-core/**'
              - 'crates/cascade-gpu/**'
              - 'crates/cascade-nodes-std/**'

      - id: docs_only
        name: Detect docs-only changes
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
            mapfile -t changed_files < <(git diff --name-only "origin/${{ github.base_ref }}...$GITHUB_SHA")
          else
            before_sha="${{ github.event.before }}"
            if [ "$before_sha" = "0000000000000000000000000000000000000000" ]; then
              mapfile -t changed_files < <(git ls-tree -r --name-only "$GITHUB_SHA")
            else
              mapfile -t changed_files < <(git diff --name-only "$before_sha" "$GITHUB_SHA")
            fi
          fi

          docs_only=true
          if [ "${#changed_files[@]}" -eq 0 ]; then
            docs_only=false
          fi

          for file in "${changed_files[@]}"; do
            case "$file" in
              *.md|docs/*|reviews/*|implementation-plans/*|.github/PULL_REQUEST_TEMPLATE.md)
                ;;
              *)
                docs_only=false
                break
                ;;
            esac
          done

          echo "value=$docs_only" >> "$GITHUB_OUTPUT"

      - name: Summarize selected jobs
        run: |
          {
            echo "## CI change detection"
            echo ""
            echo "| Scope | Matched |"
            echo "| --- | --- |"
            echo "| Rust | ${{ steps.code_filter.outputs.rust }} |"
            echo "| Frontend | ${{ steps.code_filter.outputs.frontend }} |"
            echo "| E2E | ${{ steps.code_filter.outputs.e2e }} |"
            echo "| Docs only | ${{ steps.docs_only.outputs.value }} |"
            echo ""
            echo "### Jobs to run"
            echo ""
            if [ "${{ steps.code_filter.outputs.rust }}" = "true" ]; then
              echo "- Rust Check & Test"
              echo "- Rust Lint (clippy + fmt)"
              echo "- Benchmarks (compile check)"
            fi
            if [ "${{ steps.code_filter.outputs.frontend }}" = "true" ]; then
              echo "- Frontend Lint & Typecheck"
            fi
            if [ "${{ steps.code_filter.outputs.e2e }}" = "true" ]; then
              echo "- E2E Tests (Playwright)"
            fi
            if [ "${{ steps.code_filter.outputs.rust }}" != "true" ] \
              && [ "${{ steps.code_filter.outputs.frontend }}" != "true" ] \
              && [ "${{ steps.code_filter.outputs.e2e }}" != "true" ]; then
              echo "- No heavy CI jobs selected"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  rust-check:
    name: Rust Check & Test
    needs: changes
    if: ${{ needs.changes.outputs.rust == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Check (all crates)
        run: cargo check --workspace $WORKSPACE_EXCLUDES

      - name: Run tests
        run: cargo test --workspace $WORKSPACE_EXCLUDES

  rust-lint:
    name: Rust Lint (clippy + fmt)
    needs: changes
    if: ${{ needs.changes.outputs.rust == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --workspace --all-targets $WORKSPACE_EXCLUDES -- -D warnings

      - name: Rustfmt
        run: cargo fmt --all -- --check

      - name: Check for error swallowing patterns
        run: |
          # WASM bridge: no unwrap_or(JsValue::NULL)
          if grep -n 'unwrap_or(JsValue::NULL)' crates/cascade-wasm/src/lib.rs; then
            echo '::error::Found unwrap_or(JsValue::NULL) in WASM bridge — use .map_err(to_js_error)? instead'
            exit 1
          fi

  bench-compile:
    name: Benchmarks (compile check)
    needs: changes
    if: ${{ needs.changes.outputs.rust == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Compile benchmarks
        run: cargo bench --no-run --workspace $WORKSPACE_EXCLUDES

  frontend-lint:
    name: Frontend Lint & Typecheck
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown
          components: rust-src

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build WASM package
        run: yarn build:wasm

      - name: Typecheck
        run: npx tsc -b --noEmit

      - name: Lint
        run: yarn lint

      - name: CSS Lint
        run: yarn lint:css

      - name: Unit tests
        run: yarn test

  e2e-test:
    name: E2E Tests (Playwright)
    needs: changes
    if: ${{ needs.changes.outputs.e2e == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown
          components: rust-src

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build WASM package
        run: yarn build:wasm

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: |
            apps/web/test-results/
          retention-days: 7
