name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  # Crates requiring system libraries (glib, OpenColorIO, webkit2gtk) not available on CI
  WORKSPACE_EXCLUDES: --exclude cascade-ocio-sys --exclude cascade-ocio --exclude cascade-tauri

jobs:
  rust-check:
    name: Rust Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Check (all crates)
        run: cargo check --workspace $WORKSPACE_EXCLUDES

      - name: Run tests
        run: cargo test --workspace $WORKSPACE_EXCLUDES

  rust-lint:
    name: Rust Lint (clippy + fmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --workspace --all-targets $WORKSPACE_EXCLUDES -- -D warnings

      - name: Rustfmt
        run: cargo fmt --all -- --check

      - name: Check for error swallowing patterns
        run: |
          # WASM bridge: no unwrap_or(JsValue::NULL)
          if grep -n 'unwrap_or(JsValue::NULL)' crates/cascade-wasm/src/lib.rs; then
            echo '::error::Found unwrap_or(JsValue::NULL) in WASM bridge — use .map_err(to_js_error)? instead'
            exit 1
          fi

  bench-compile:
    name: Benchmarks (compile check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Compile benchmarks
        run: cargo bench --no-run --workspace $WORKSPACE_EXCLUDES

  frontend-lint:
    name: Frontend Lint & Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown
          components: rust-src

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build WASM package
        run: yarn build:wasm

      - name: Typecheck
        run: npx tsc -b --noEmit

      - name: Lint
        run: yarn lint

      - name: CSS Lint
        run: yarn lint:css
  e2e-test:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown
          components: rust-src

      - uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build WASM package
        run: yarn build:wasm

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: |
            apps/web/test-results/
          retention-days: 7
