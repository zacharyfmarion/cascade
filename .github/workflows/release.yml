name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RELEASE_GITHUB_REPO: zacharyfmarion/cascade
  HOMEBREW_TAP_REPO: zacharyfmarion/homebrew-cascade

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      is_release_tag: ${{ steps.get_version.outputs.is_release_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: get_version
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
            echo "is_release_tag=true" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(jq -r '.version' package.json)" >> "$GITHUB_OUTPUT"
            echo "is_release_tag=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch main
        run: git fetch origin main

      - name: Validate release version
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
          IS_RELEASE_TAG: ${{ steps.get_version.outputs.is_release_tag }}
        run: |
          set -euo pipefail

          if [ "$IS_RELEASE_TAG" = "true" ] && ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "::error::Tagged commit $GITHUB_SHA is not reachable from origin/main"
            exit 1
          fi

          ROOT_VERSION=$(jq -r '.version' package.json)
          WEB_VERSION=$(jq -r '.version' apps/web/package.json)
          TAURI_VERSION=$(jq -r '.version' apps/tauri/src-tauri/tauri.conf.json)
          CARGO_VERSION=$(sed -n 's/^version = "\(.*\)"/\1/p' apps/tauri/src-tauri/Cargo.toml | head -n 1)

          for actual in "$ROOT_VERSION" "$WEB_VERSION" "$TAURI_VERSION" "$CARGO_VERSION"; do
            if [ "$actual" != "$VERSION" ]; then
              echo "::error::Version mismatch. Expected $VERSION, found $actual"
              exit 1
            fi
          done

      - name: Extract release notes from CHANGELOG
        if: steps.get_version.outputs.is_release_tag == 'true'
        env:
          VERSION: ${{ steps.get_version.outputs.version }}
        run: |
          set -euo pipefail

          awk -v version="$VERSION" '
            BEGIN {
              in_section = 0
              found = 0
            }
            $0 ~ "^## \\[" version "\\] - " {
              in_section = 1
              found = 1
              next
            }
            /^## \[/ && in_section {
              exit
            }
            in_section {
              print
            }
            END {
              if (!found) {
                exit 2
              }
            }
          ' CHANGELOG.md > release-notes.md || {
            status=$?
            if [ "$status" -eq 2 ]; then
              echo "::error::No CHANGELOG.md entry found for $VERSION"
            fi
            exit "$status"
          }

          if [ ! -s release-notes.md ] || [ -z "$(tr -d '[:space:]' < release-notes.md)" ]; then
            echo "::error::CHANGELOG.md entry for $VERSION is empty"
            exit 1
          fi

      - name: Upload release notes artifact
        if: steps.get_version.outputs.is_release_tag == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md

  build:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: 'macos-15'
            rust_target: 'aarch64-apple-darwin'
            arch: 'aarch64'
          - runner: 'macos-15-intel'
            rust_target: 'x86_64-apple-darwin'
            arch: 'x64'

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2' --locked

      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Build signed Tauri app bundle
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        working-directory: apps/tauri/src-tauri
        run: cargo tauri build --target ${{ matrix.rust_target }} --bundles app

      - name: Create DMG from signed app bundle
        env:
          TARGET_TRIPLE: ${{ matrix.rust_target }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          set -euo pipefail

          OUTER_APP="apps/tauri/src-tauri/target/$TARGET_TRIPLE/release/bundle/macos/Cascade.app"
          DMG_DIR="apps/tauri/src-tauri/target/$TARGET_TRIPLE/release/bundle/dmg"
          DMG_PATH="$DMG_DIR/Cascade_${VERSION}_${{ matrix.arch }}.dmg"
          TEMP_DMG_PATH="$RUNNER_TEMP/Cascade_${VERSION}_${{ matrix.arch }}.dmg"
          STAGING_DIR="$RUNNER_TEMP/dmg-root-${{ matrix.arch }}"
          STAGED_APP="$STAGING_DIR/Cascade.app"

          if [ ! -d "$OUTER_APP" ]; then
            echo "::error::Missing signed app bundle at $OUTER_APP"
            exit 1
          fi

          echo "Verifying $OUTER_APP"
          codesign --verify --deep --strict --verbose=2 "$OUTER_APP"
          codesign -dv --verbose=4 "$OUTER_APP"

          rm -rf "$STAGING_DIR" "$DMG_DIR"
          mkdir -p "$STAGING_DIR" "$DMG_DIR"

          ditto "$OUTER_APP" "$STAGED_APP"
          ln -s /Applications "$STAGING_DIR/Applications"

          attempt=1
          until hdiutil create \
            -volname "Cascade" \
            -srcfolder "$STAGING_DIR" \
            -fs HFS+ \
            -format UDZO \
            -imagekey zlib-level=9 \
            -ov \
            "$TEMP_DMG_PATH"; do
            if [ "$attempt" -ge 3 ]; then
              echo "::error::hdiutil create failed after $attempt attempts"
              exit 1
            fi

            echo "Retrying hdiutil create after transient failure (attempt $attempt)"
            rm -f "$TEMP_DMG_PATH"
            pkill -x diskimages-helper 2>/dev/null || true
            sleep $((attempt * 5))
            attempt=$((attempt + 1))
          done

          mv "$TEMP_DMG_PATH" "$DMG_PATH"

      - name: Sign DMG
        env:
          TARGET_TRIPLE: ${{ matrix.rust_target }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail

          DMG_PATH=$(find "apps/tauri/src-tauri/target/$TARGET_TRIPLE/release/bundle/dmg" -name "*.dmg" -type f | head -1)

          if [ -z "$DMG_PATH" ]; then
            echo "::error::Missing DMG output for $TARGET_TRIPLE"
            exit 1
          fi

          codesign --force --sign "$APPLE_SIGNING_IDENTITY" --timestamp "$DMG_PATH"

      - name: Verify signed release artifacts
        env:
          TARGET_TRIPLE: ${{ matrix.rust_target }}
        run: |
          set -euo pipefail

          DMG_PATH=$(find "apps/tauri/src-tauri/target/$TARGET_TRIPLE/release/bundle/dmg" -name "*.dmg" -type f | head -1)

          if [ -z "$DMG_PATH" ]; then
            echo "::error::Missing DMG output for $TARGET_TRIPLE"
            exit 1
          fi

          echo "Verifying $DMG_PATH"
          codesign --verify --verbose=2 "$DMG_PATH"
          codesign -dv --verbose=4 "$DMG_PATH"

          MOUNT_DIR="$RUNNER_TEMP/dmg-mount-${{ matrix.arch }}"
          rm -rf "$MOUNT_DIR"
          mkdir -p "$MOUNT_DIR"

          cleanup_mount() {
            hdiutil detach "$MOUNT_DIR" -quiet 2>/dev/null || true
          }
          trap cleanup_mount EXIT

          hdiutil attach "$DMG_PATH" -mountpoint "$MOUNT_DIR" -nobrowse -quiet

          MOUNTED_APP="$MOUNT_DIR/Cascade.app"

          if [ ! -d "$MOUNTED_APP" ]; then
            echo "::error::Mounted DMG is missing Cascade.app"
            exit 1
          fi

          echo "Verifying mounted $MOUNTED_APP"
          codesign --verify --deep --strict --verbose=2 "$MOUNTED_APP"
          codesign -dv --verbose=4 "$MOUNTED_APP"

          cleanup_mount
          trap - EXIT

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TARGET_TRIPLE: ${{ matrix.rust_target }}
        run: |
          set -euo pipefail

          DMG_PATH=$(find "apps/tauri/src-tauri/target/$TARGET_TRIPLE/release/bundle/dmg" -name "*.dmg" -type f | head -1)
          if [ -z "$DMG_PATH" ]; then
            echo "::error::No DMG found for notarization"
            exit 1
          fi

          echo "Notarizing: $DMG_PATH"

          SUBMISSION_JSON="$RUNNER_TEMP/notarytool-submit-${{ matrix.arch }}.json"
          LOG_JSON="$RUNNER_TEMP/notarytool-log-${{ matrix.arch }}.json"

          set +e
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --output-format json | tee "$SUBMISSION_JSON"
          SUBMIT_EXIT=${PIPESTATUS[0]}
          set -e

          SUBMISSION_ID=$(jq -r '.id // empty' "$SUBMISSION_JSON" 2>/dev/null || true)
          SUBMISSION_STATUS=$(jq -r '.status // empty' "$SUBMISSION_JSON" 2>/dev/null || true)

          if [ -n "$SUBMISSION_ID" ] && { [ "$SUBMIT_EXIT" -ne 0 ] || [ "$SUBMISSION_STATUS" != "Accepted" ]; }; then
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --output-format json | tee "$LOG_JSON"
          fi

          if [ "$SUBMIT_EXIT" -ne 0 ]; then
            echo "::error::notarytool submit exited with status $SUBMIT_EXIT"
            exit "$SUBMIT_EXIT"
          fi

          if [ "$SUBMISSION_STATUS" != "Accepted" ]; then
            echo "::error::Notarization failed with status '$SUBMISSION_STATUS'"
            exit 1
          fi

          xcrun stapler staple "$DMG_PATH"
          echo "Notarization complete"

      - name: Upload notarization logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: notarization-logs-${{ matrix.arch }}
          if-no-files-found: ignore
          path: |
            ${{ runner.temp }}/notarytool-submit-${{ matrix.arch }}.json
            ${{ runner.temp }}/notarytool-log-${{ matrix.arch }}.json

      - name: Find DMG and calculate SHA256
        id: dmg_info
        env:
          TARGET_TRIPLE: ${{ matrix.rust_target }}
        run: |
          set -euo pipefail

          DMG_PATH=$(find "apps/tauri/src-tauri/target/$TARGET_TRIPLE/release/bundle/dmg" -name "*.dmg" -type f | head -1)
          if [ -z "$DMG_PATH" ]; then
            echo "::error::No DMG found after build"
            exit 1
          fi

          DMG_NAME=$(basename "$DMG_PATH")
          VERSIONED_PATH="$RUNNER_TEMP/$DMG_NAME"
          cp "$DMG_PATH" "$VERSIONED_PATH"

          STABLE_NAME="Cascade_latest_${{ matrix.arch }}.dmg"
          STABLE_PATH="$RUNNER_TEMP/$STABLE_NAME"
          cp "$DMG_PATH" "$STABLE_PATH"

          SHA256=$(shasum -a 256 "$DMG_PATH" | cut -d ' ' -f 1)

          echo "dmg_path=$VERSIONED_PATH" >> "$GITHUB_OUTPUT"
          echo "stable_path=$STABLE_PATH" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"

      - name: Upload DMG artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dmg-${{ matrix.arch }}
          path: |
            ${{ steps.dmg_info.outputs.dmg_path }}
            ${{ steps.dmg_info.outputs.stable_path }}

      - name: Save SHA256 to file
        run: echo "${{ steps.dmg_info.outputs.sha256 }}" > sha256-${{ matrix.arch }}.txt

      - name: Upload SHA256 artifact
        uses: actions/upload-artifact@v4
        with:
          name: sha256-${{ matrix.arch }}
          path: sha256-${{ matrix.arch }}.txt

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" 2>/dev/null || true

  release:
    needs:
      - validate
      - build
    if: needs.validate.outputs.is_release_tag == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Read SHA256 hashes
        id: hashes
        run: |
          SHA256_ARM=$(cat artifacts/sha256-aarch64/sha256-aarch64.txt)
          SHA256_INTEL=$(cat artifacts/sha256-x64/sha256-x64.txt)
          echo "sha256_arm=$SHA256_ARM" >> "$GITHUB_OUTPUT"
          echo "sha256_intel=$SHA256_INTEL" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Cascade v${{ needs.validate.outputs.version }}
          body_path: artifacts/release-notes/release-notes.md
          files: |
            artifacts/dmg-aarch64/*.dmg
            artifacts/dmg-x64/*.dmg
          draft: false
          prerelease: false

      - name: Update Homebrew Cask
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ needs.validate.outputs.version }}
          SHA256_ARM: ${{ steps.hashes.outputs.sha256_arm }}
          SHA256_INTEL: ${{ steps.hashes.outputs.sha256_intel }}
        run: |
          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${HOMEBREW_TAP_REPO}.git tap
          cd tap

          mkdir -p Casks
          cat > Casks/cascade.rb << 'CASK_EOF'
          cask "cascade" do
            arch arm: "aarch64", intel: "x64"

            version "VERSION_PLACEHOLDER"
            sha256 arm:   "SHA256_ARM_PLACEHOLDER",
                   intel: "SHA256_INTEL_PLACEHOLDER"

            url "https://github.com/zacharyfmarion/cascade/releases/download/v#{version}/Cascade_#{version}_#{arch}.dmg",
                verified: "github.com/zacharyfmarion/"

            name "Cascade"
            desc "Node-based image editor built on a Rust graph engine"
            homepage "https://github.com/zacharyfmarion/cascade"

            app "Cascade.app"

            zap trash: [
              "~/Library/Application Support/com.cascade.app",
              "~/Library/Caches/com.cascade.app",
              "~/Library/Preferences/com.cascade.app.plist",
            ]
          end
          CASK_EOF

          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/g" Casks/cascade.rb
          sed -i "s/SHA256_ARM_PLACEHOLDER/${SHA256_ARM}/g" Casks/cascade.rb
          sed -i "s/SHA256_INTEL_PLACEHOLDER/${SHA256_INTEL}/g" Casks/cascade.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/cascade.rb
          git commit -m "Update cascade to v${VERSION}" || echo "No changes to commit"
          git push
